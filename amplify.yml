version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install Git LFS (needed for large blueprint images)
        # AWS Amplify uses Amazon Linux 2 - install git-lfs via yum
        - |
          if ! command -v git-lfs &> /dev/null; then
            sudo yum install -y git-lfs 2>/dev/null || {
              # Fallback: Download and install Git LFS binary manually
              curl -L https://github.com/git-lfs/git-lfs/releases/download/v3.6.1/git-lfs-linux-amd64-v3.6.1.tar.gz -o /tmp/git-lfs.tar.gz
              tar -xzf /tmp/git-lfs.tar.gz -C /tmp
              /tmp/git-lfs install
              export PATH="/tmp:$PATH"
            }
          fi
        - git lfs install
        - git lfs pull
        - npm ci
    build:
      commands:
        - npm run build
  environment:
    # Backend API URL - Update with your production backend URL
    VITE_API_URL: https://api.nm2tech-sas.com  # ← Update this with your actual backend URL
    
    # FloorMap AI backend - add if you deploy backend-floormap (e.g. https://floormap-api.nm2tech-sas.com)
    # VITE_FLOORMAP_API_URL: https://your-floormap-backend.com
    
    # Production Stripe Publishable Key
    VITE_STRIPE_PUBLISHABLE_KEY: pk_live_51RilIPCAL4InIKRQlas1xaG2odzZNj70YikLjKe1Jvf8qU2pKtx4HzLLm2Y5NP0FF4tJaf20nA08FOKAXPNB2awU00HXHdOVz8
    
    # Production Price IDs
    VITE_STRIPE_PRO_PRICE_ID: price_1Sak7ICAL4InIKRQecSqTjLb
    VITE_STRIPE_ENTERPRISE_PRICE_ID: price_1ScFgsCAL4InIKRQyL2PJ5Q4
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .vite/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'X-Frame-Options'
          value: 'SAMEORIGIN'
        - key: 'X-XSS-Protection'
          value: '1; mode=block'
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains'
    - pattern: '/sw.js'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=0, must-revalidate'
    - pattern: '**/*.js'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.css'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.png'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.svg'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
  customRedirects:
    - source: '/<*>'
      target: '/index.html'
      status: '200'

